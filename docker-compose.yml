  #      - /app/node_modules
  #    depends_on:
  #      postgres:
  #        condition: service_healthy
  #      redis:
  #        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: sportykore_postgres
    environment:
      POSTGRES_USER: sportykore
      POSTGRES_PASSWORD: herbBoss
      POSTGRES_DB: sportykore_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sportykore -d sportykore_dev']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sportykore_redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

