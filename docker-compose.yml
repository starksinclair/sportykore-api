services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: sportykore_api
    command: ['sh', '-c', 'node ace migration:run && node ace serve --watch']
    ports:
      - '3333:3333'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333

      DB_CONNECTION: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: sportykore
      DB_PASSWORD: herbBoss
      DB_DATABASE: sportykore_dev

      # Redis (for BullMQ / Transmit backplane / caching, etc.)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # REDIS_PASSWORD: "test"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  #  worker:
  #    build:
