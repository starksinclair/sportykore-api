services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: sportykore_api_dev
    command: ['sh', '-c', 'node ace migration:run && node ace serve --watch']
    ports:
      - '3333:3333'
    env_file:
      - .env.dev
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # POSTGRES_* below use ${DB_*} — Compose reads those from --env-file .env.dev (see npm run dev).
  postgres:
    image: postgres:16-alpine
    container_name: sportykore_postgres_dev
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sportykore_redis_dev
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  node_modules:
  pgdata_dev:
